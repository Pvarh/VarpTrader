<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VarpTrader{% endblock %}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="nav-left">
        <a href="/" class="navbar-brand">VarpTrader</a>
        <span class="nav-status" id="wsStatus">connecting...</span>
    </div>
    <ul class="navbar-links">
        <li><a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a></li>
        <li><a href="/trades" class="{% if active_page == 'trades' %}active{% endif %}">Trades</a></li>
        <li><a href="/analysis" class="{% if active_page == 'analysis' %}active{% endif %}">Analysis</a></li>
        <li><a href="/config" class="{% if active_page == 'config' %}active{% endif %}">Config</a></li>
    </ul>
</nav>

<!-- Page Content -->
<main class="page-content">
    {% block content %}{% endblock %}
</main>

<!-- Base WebSocket for connection status indicator -->
<script>
(function() {
    var statusEl = document.getElementById('wsStatus');
    var reconnect = 0;

    function connectStatusWs() {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var ws = new WebSocket(proto + '//' + location.host + '/ws/pnl');

        ws.onopen = function() {
            reconnect = 0;
            if (statusEl) { statusEl.textContent = 'live'; statusEl.className = 'nav-status nav-status-ok'; }
        };
        ws.onmessage = function(event) {
            /* Dispatch to page-level handler if defined */
            if (window.onPnlUpdate) {
                try { window.onPnlUpdate(JSON.parse(event.data)); } catch(e) {}
            }
        };
        ws.onclose = function() {
            if (statusEl) { statusEl.textContent = 'reconnecting...'; statusEl.className = 'nav-status'; }
            reconnect++;
            setTimeout(connectStatusWs, Math.min(1000 * Math.pow(2, reconnect), 30000));
        };
        ws.onerror = function() {
            if (statusEl) { statusEl.textContent = 'error'; statusEl.className = 'nav-status nav-status-err'; }
        };
    }

    document.addEventListener('DOMContentLoaded', connectStatusWs);
})();
</script>

{% block scripts %}{% endblock %}

</body>
</html>
